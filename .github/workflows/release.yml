name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (for example 0.1.1)
        required: true
      hermes_ref:
        description: Hermes upstream git ref (commit, tag, or branch)
        required: false
        default: '18140199c3a1cbb658a2eeadf692ffb8b5d1626f'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install deps
        run: pnpm install

      - name: Sync version for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          node -e "const fs=require('fs'); const version='${{ inputs.version }}'; for (const file of ['package.json','apps/desktop/package.json']) { const data=JSON.parse(fs.readFileSync(file,'utf8')); data.version=version; fs.writeFileSync(file, JSON.stringify(data, null, 2)+'\n'); }"

      - name: Build app icons
        run: pnpm icons:build

      - name: Build bundled Hermes runtime
        env:
          HERMES_AGENT_REF: ${{ github.event.inputs.hermes_ref || '18140199c3a1cbb658a2eeadf692ffb8b5d1626f' }}
        run: pnpm runtime:build

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: pnpm package:mac

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: pnpm package:win

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: pnpm package:linux

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-${{ runner.os }}
          path: apps/desktop/release/**

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && format('clawT v{0}', inputs.version) || format('clawT {0}', github.ref_name) }}
          draft: true
          files: |
            dist-artifacts/**/*
          generate_release_notes: true
